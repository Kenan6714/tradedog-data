name: TEFAS Nightly Refresh

# Her gece 00:00 UTC = 03:00 Türkiye saati
# Borsa kapalı, fon NAV'ları açıklandıktan sonra
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:  # Manuel tetikleme (Actions UI'dan)

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # JSON commit + push için gerekli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch TEFAS funds (YAT + EMK + BYF)
        run: python scripts/fetch_tefas.py

      - name: Show diff summary
        run: |
          git --no-pager diff --stat -- yat.json emk.json byf.json || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- yat.json emk.json byf.json; then
            echo "::notice::No fund data changes — skipping commit."
            exit 0
          fi

          git add yat.json emk.json byf.json
          git commit -m "chore(tefas): nightly refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
